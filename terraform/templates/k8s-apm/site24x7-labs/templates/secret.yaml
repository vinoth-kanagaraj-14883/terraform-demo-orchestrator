apiVersion: v1
kind: Secret
metadata:
  name: {{ include "site24x7-labs.fullname" . }}-secrets
  labels:
    {{- include "site24x7-labs.labels" . | nindent 4 }}
type: Opaque
data:
  DB_PASSWORD: {{ if .Values.postgresql.enabled }}{{ .Values.postgresql.auth.password | b64enc }}{{ else }}{{ .Values.externalDatabase.password | b64enc }}{{ end }}
  REDIS_PASSWORD: {{ if .Values.redis.enabled }}{{ .Values.redis.auth.password | default "" | b64enc }}{{ else }}{{ .Values.externalRedis.password | default "" | b64enc }}{{ end }}
  JWT_SECRET: {{ required "auth.jwtSecret is required" .Values.auth.jwtSecret | b64enc }}
  ADMIN_PASSWORD: {{ required "auth.adminPassword is required" .Values.auth.adminPassword | b64enc }}
  AGENT_TOKEN: {{ .Values.auth.agentToken | default "" | b64enc }}
