{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "site24x7-labs.fullname" . }}-frontend
  labels:
    {{- include "site24x7-labs.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.serviceFrontend.type }}
  ports:
    - port: {{ .Values.serviceFrontend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "site24x7-labs.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
{{- end }}
